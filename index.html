<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수어 단어 사전</title>
<style>
  :root{
    --bg:#0f1220; --panel:#181c2e; --card:#1e2338; --card-h:#262c47;
    --text:#eef1ff; --muted:#9aa3c4; --accent:#6c8cff; --accent-2:#39d0c4;
    --border:#2a3050; --shadow:0 8px 28px rgba(0,0,0,.35);
    --header-bg:rgba(15,18,32,.82); --thumb:#0c0f1c;
    --body-grad:radial-gradient(1200px 700px at 50% -10%,#1a2040 0%,var(--bg) 60%);
  }
  body.light{
    --bg:#eef1f8; --panel:#ffffff; --card:#ffffff; --card-h:#eef2fb;
    --text:#1a2030; --muted:#5b6480; --accent:#4a6cf7; --accent-2:#0fb5a8;
    --border:#dfe4f0; --shadow:0 10px 30px rgba(40,60,120,.14);
    --header-bg:rgba(255,255,255,.85); --thumb:#eef1f8;
    --body-grad:radial-gradient(1200px 700px at 50% -10%,#dde6fb 0%,var(--bg) 60%);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--body-grad);
    color:var(--text); min-height:100vh;
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    transition:background .25s, color .25s;
  }
  header{
    position:sticky; top:0; z-index:20;
    background:var(--header-bg); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); padding:18px 20px 14px;
  }
  .wrap{max-width:1500px; margin:0 auto}
  .title{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap}
  .title-left{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .theme-toggle{
    display:flex; align-items:center; gap:7px; flex-shrink:0;
    padding:8px 14px; font-size:14px; font-weight:600; border-radius:999px; cursor:pointer;
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    transition:all .15s; user-select:none;
  }
  .theme-toggle:hover{background:var(--card-h); border-color:var(--accent)}
  h1{font-size:24px; margin:0; letter-spacing:-.5px}
  .sub{color:var(--muted); font-size:13px}
  .searchbar{position:relative; margin:14px 0 12px}
  .searchbar input{
    width:100%; padding:14px 46px 14px 46px; font-size:17px;
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    color:var(--text); outline:none; transition:border-color .15s, box-shadow .15s;
  }
  .searchbar input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,140,255,.18)}
  .searchbar .ico{position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:18px}
  .searchbar .clear{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:6px; line-height:1;
    display:none;
  }
  .tabs{display:flex; gap:8px; flex-wrap:wrap}
  .tab{
    padding:8px 14px; font-size:14px; border-radius:999px; cursor:pointer;
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    transition:all .12s; user-select:none; white-space:nowrap;
  }
  .tab:hover{background:var(--card-h); color:var(--text)}
  .tab.active{background:linear-gradient(135deg,var(--accent),#8a6cff); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(108,140,255,.4)}
  .tab .cnt{opacity:.75; font-size:12px; margin-left:5px}
  main{max-width:1500px; margin:0 auto; padding:22px 20px 60px}
  .count{color:var(--muted); font-size:13px; margin-bottom:14px}
  .grid{
    display:grid; gap:16px;
    grid-template-columns:repeat(5,1fr);
  }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; cursor:pointer; transition:transform .14s, box-shadow .14s, border-color .14s;
    display:flex; flex-direction:column;
  }
  .card:hover{transform:translateY(-4px); box-shadow:var(--shadow); border-color:var(--accent)}
  .thumb{
    position:relative; width:100%; aspect-ratio:4/3; background:var(--thumb);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .thumb img{width:100%; height:100%; object-fit:contain; display:block}
  .thumb .ph{color:var(--muted); font-size:13px}
  .meta{padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px}
  .word{font-size:18px; font-weight:600; letter-spacing:-.3px}
  .badge{font-size:11px; color:var(--accent-2); background:rgba(57,208,196,.12); padding:3px 8px; border-radius:999px; white-space:nowrap}
  .empty{text-align:center; color:var(--muted); padding:80px 20px; font-size:16px}
  /* modal */
  .modal{
    position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center; padding:2vh 2vw;
    background:rgba(6,8,18,.82); backdrop-filter:blur(6px);
  }
  .modal.open{display:flex}
  .dialog{
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    width:auto; max-width:96vw; max-height:96vh;
    display:flex; flex-direction:column;
    box-shadow:var(--shadow); overflow:hidden; animation:pop .18s ease;
  }
  @keyframes pop{from{transform:scale(.96); opacity:0}to{transform:scale(1); opacity:1}}
  .dialog .head{display:flex; align-items:center; justify-content:space-between; gap:24px; padding:16px 24px; border-bottom:1px solid var(--border); flex-shrink:0}
  .dialog .head .w{font-size:30px; font-weight:700}
  .dialog .head .x{background:none; border:none; color:var(--muted); font-size:30px; cursor:pointer; line-height:1; padding:4px}
  .dialog .body{background:var(--thumb); display:flex; align-items:center; justify-content:center; padding:14px}
  .dialog .body img{display:block; height:80vh; width:auto; max-width:92vw; object-fit:contain}
  .dialog .foot{padding:12px 20px; color:var(--muted); font-size:13px; display:flex; gap:14px; align-items:center}
  .nav{position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.4); border:1px solid var(--border); color:#fff; width:46px; height:46px; border-radius:50%; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  .nav:hover{background:var(--accent)}
  .nav.prev{left:14px} .nav.next{right:14px}
  @media (max-width:1100px){ .grid{grid-template-columns:repeat(3,1fr)} }
  @media (max-width:680px){
    .grid{grid-template-columns:repeat(2,1fr); gap:12px}
    h1{font-size:20px} .word{font-size:16px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="title">
      <div class="title-left">
        <h1>수어 단어 사전</h1>
        <span class="sub">한국 수어 단어 67개 · 검색하거나 카테고리를 눌러 찾아보세요</span>
      </div>
      <button class="theme-toggle" id="themeBtn" aria-label="테마 전환"></button>
    </div>
    <div class="searchbar">
      <span class="ico">🔍</span>
      <input id="search" type="text" placeholder="단어 검색 (예: 안녕, 먹다, 가족...)" autocomplete="off">
      <button class="clear" id="clear" aria-label="지우기">×</button>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다.</div>
</main>

<div class="modal" id="modal">
  <button class="nav prev" id="prev" aria-label="이전">‹</button>
  <div class="dialog" role="dialog" aria-modal="true">
    <div class="head">
      <span class="w" id="mWord"></span>
      <button class="x" id="mClose" aria-label="닫기">×</button>
    </div>
    <div class="body"><img id="mImg" alt=""></div>
    <div class="foot"><span id="mCat"></span><span id="mIdx"></span></div>
  </div>
  <button class="nav next" id="next" aria-label="다음">›</button>
</div>

<script>
// 데이터: [단어, GIF파일명(확장자 제외), 카테고리]
const DATA = [
  ["안녕","안녕","인사·소개"],["무엇","무엇","의문사"],["고기","고기","음식"],["비빔밥","비빔밥","음식"],
  ["기쁘다","기쁘다","감정·상태"],["취미","취미","취미·여가"],["나","나","사람·관계"],["영화","영화","취미·여가"],
  ["얼굴","얼굴","신체"],["보다","보다","동작"],["이름","이름","인사·소개"],["감사하다","감사하다","인사·소개"],
  ["같다","같다","동작"],["미안하다","미안하다","인사·소개"],["먹다","먹다","음식"],["괜찮다","괜찮다","인사·소개"],
  ["노력하다","노력하다","동작"],["나이","나이","시간"],["다시","다시","동작"],["몇","몇","의문사"],
  ["하루","하루","시간"],["좋다","좋다","감정·상태"],["언제","언제","의문사"],["우리","우리","사람·관계"],
  ["지하철","지하철","교통·이동"],["버스","버스","교통·이동"],["타다","타다","교통·이동"],["휴대폰","휴대폰","기타"],
  ["어디","어디","의문사"],["위치","위치","장소·위치"],["책임","책임","기타"],["누구","누구","의문사"],
  ["도착하다","도착하다","동작"],["가족","가족","사람·관계"],["시간","시간","시간"],["소개","소개","인사·소개"],
  ["받다","받다","동작"],["부탁","부탁","인사·소개"],["걷다","걷다","동작"],["자매","자매","사람·관계"],
  ["공부하다","공부하다","취미·여가"],["사람","사람","사람·관계"],["지금","지금","시간"],["특별하다","특별하다","감정·상태"],
  ["어제","어제","시간"],["시험","시험","취미·여가"],["끝나다","끝나다","감정·상태"],["너","너","사람·관계"],
  ["걱정하다","걱정하다","감정·상태"],["결혼하다","결혼하다","동작"],["노력","노력","동작"],["아니다","아니다","감정·상태"],
  ["땀","땀","신체"],["아직","아직","시간"],["결국","결국","시간"],["태어나다","태어나다","동작"],
  ["성공","성공","감정·상태"],["부탁","부탁2","인사·소개"],["서울","서울","장소·위치"],["저녁","저녁","시간"],
  ["경험","경험","취미·여가"],["초대하다","초대하다","동작"],["음식","음식","음식"],["원하다","원하다","동작"],
  ["한시간","한시간","시간"],["좋다","좋다2","감정·상태"],["돌보다","돌보다","동작"],
  ["신발","신발","사물"],["하나","하나","기타"],["아침","아침","시간"],["오늘","오늘","시간"],["사탕","사탕","음식"],
  ["일어나다","일어나다","동작"],["앉다","앉다","동작"],["마시다","마시다","동작"],["주다","주다","동작"],["물","물","음식"],
  ["입다","입다","동작"],["묻다","묻다","동작"],["알다","알다","동작"],["모르다","모르다","동작"],
  ["나비","나비","동물"],["호랑이","호랑이","동물"],["토끼","토끼","동물"],["코끼리","코끼리","동물"],["다람쥐","다람쥐","동물"],
  ["여우","여우","동물"],["뱀","뱀","동물"],["늑대","늑대","동물"],["돼지","돼지","동물"],["용","용","동물"],
  ["사슴","사슴","동물"],["제비","제비","동물"],["송아지","송아지","동물"],
  ["학교","학교","장소·위치"],["유치원","유치원","장소·위치"],["초등학교","초등학교","장소·위치"],
  ["양말","양말","사물"],["의자","의자","사물"],["풍선","풍선","사물"],["안경","안경","사물"],
  ["어머니","어머니","사람·관계"],["오누이","오누이","사람·관계"],["선녀","선녀","사람·관계"],["아이","아이","사람·관계"],["동생","동생","사람·관계"],
  ["소녀","소녀","사람·관계"],["오빠","오빠","사람·관계"],["할머니","할머니","사람·관계"],["아기","아기","사람·관계"],["왕자","왕자","사람·관계"],
  ["언니","언니","사람·관계"],["흥부","흥부","사람·관계"],["왕비","왕비","사람·관계"],
  ["무섭다","무섭다","감정·상태"],["착하다","착하다","감정·상태"],["후회","후회","감정·상태"],["용서","용서","감정·상태"],["사랑","사랑","감정·상태"],
  ["슬프다","슬프다","감정·상태"],["놀라다","놀라다","감정·상태"],["용감하다","용감하다","감정·상태"],["불쌍하다","불쌍하다","감정·상태"],["질투","질투","감정·상태"],
  ["화나다","화나다","감정·상태"],["배고프다","배고프다","감정·상태"],["싫다","싫다","감정·상태"],["부끄럽다","부끄럽다","감정·상태"],["미움","미움","감정·상태"],
  ["신기하다","신기하다","감정·상태"],["반갑다","반갑다","감정·상태"],["재미","재미","감정·상태"],["아프다","아프다","감정·상태"],["귀엽다","귀엽다","감정·상태"],
  ["그리워하다","그리워하다","감정·상태"],["아름답다","아름답다","감정·상태"],
  ["대답","대답","기타"],["질문","질문","기타"],["이유","이유","기타"],["혹시","혹시","기타"],["왜냐하면","왜냐하면","기타"],
  ["어떻게","어떻게","의문사"]
];
const CAT_ORDER = ["인사·소개","음식","감정·상태","취미·여가","동작","시간","사람·관계","동물","사물","교통·이동","장소·위치","신체","의문사","기타"];

const items = DATA.map(([word,file,cat],i)=>({word,file,cat,idx:i}));
let activeCat = "전체";
let query = "";
let visible = items.slice();

const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const emptyEl = document.getElementById('empty');
const searchEl = document.getElementById('search');
const clearEl = document.getElementById('clear');

// 카테고리 탭
function buildTabs(){
  const counts = {};
  items.forEach(it=>counts[it.cat]=(counts[it.cat]||0)+1);
  const cats = ["전체",...CAT_ORDER.filter(c=>counts[c])];
  tabsEl.innerHTML = cats.map(c=>{
    const n = c==="전체" ? items.length : counts[c];
    return `<div class="tab${c===activeCat?' active':''}" data-cat="${c}">${c}<span class="cnt">${n}</span></div>`;
  }).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{ activeCat=t.dataset.cat; buildTabs(); render(); };
  });
}

const src = it => "gifs/" + encodeURIComponent(it.file) + ".gif";

// IntersectionObserver 로 화면에 보일 때만 GIF 로드
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const img = e.target;
      if(!img.src){ img.src = img.dataset.src; }
      io.unobserve(img);
    }
  });
},{rootMargin:"300px 0px"});

function render(){
  query = searchEl.value.trim().toLowerCase();
  clearEl.style.display = query ? 'block' : 'none';
  visible = items.filter(it=>{
    const okCat = activeCat==="전체" || it.cat===activeCat;
    const okQ = !query || it.word.toLowerCase().includes(query);
    return okCat && okQ;
  });
  if(visible.length===0){ grid.innerHTML=''; emptyEl.style.display='block'; return; }
  emptyEl.style.display='none';
  grid.innerHTML = visible.map(it=>`
    <div class="card" data-idx="${it.idx}">
      <div class="thumb">
        <img data-src="${src(it)}" alt="${it.word} 수어" loading="lazy">
      </div>
      <div class="meta"><span class="word">${it.word}</span><span class="badge">${it.cat}</span></div>
    </div>`).join('');
  grid.querySelectorAll('img').forEach(img=>io.observe(img));
  grid.querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>openModal(parseInt(c.dataset.idx,10));
  });
}

// 모달
const modal=document.getElementById('modal');
const mImg=document.getElementById('mImg');
const mWord=document.getElementById('mWord');
const mCat=document.getElementById('mCat');
const mIdx=document.getElementById('mIdx');
let curPos=0; // visible 배열 내 위치

function openModal(globalIdx){
  curPos = visible.findIndex(it=>it.idx===globalIdx);
  showModal();
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}
function showModal(){
  const it=visible[curPos];
  mWord.textContent=it.word;
  mCat.textContent="🏷 "+it.cat;
  mIdx.textContent=`${curPos+1} / ${visible.length}`;
  mImg.src=src(it);
  mImg.alt=it.word+" 수어";
}
function closeModal(){ modal.classList.remove('open'); document.body.style.overflow=''; mImg.src=''; }
function step(d){ curPos=(curPos+d+visible.length)%visible.length; showModal(); }

document.getElementById('mClose').onclick=closeModal;
document.getElementById('prev').onclick=()=>step(-1);
document.getElementById('next').onclick=()=>step(1);
modal.onclick=(e)=>{ if(e.target===modal) closeModal(); };
document.addEventListener('keydown',(e)=>{
  if(!modal.classList.contains('open')) return;
  if(e.key==='Escape') closeModal();
  else if(e.key==='ArrowLeft') step(-1);
  else if(e.key==='ArrowRight') step(1);
});

searchEl.addEventListener('input',render);
clearEl.onclick=()=>{ searchEl.value=''; searchEl.focus(); render(); };

// 다크/라이트 테마 토글 (선택값 저장)
const themeBtn=document.getElementById('themeBtn');
function applyTheme(t){
  const light = t==='light';
  document.body.classList.toggle('light', light);
  themeBtn.textContent = light ? '🌙 다크' : '☀️ 라이트';
}
applyTheme(localStorage.getItem('theme') || 'dark');
themeBtn.onclick=()=>{
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  applyTheme(next);
};

buildTabs();
render();
</script>
</body>
</html>
